name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11

      - name: Build AppImage
        run: nix build .#appimage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: moopon-appimage
          path: result/bin/moopon.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.11

      - name: Build AppImage
        run: nix build .#appimage

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: result/bin/moopon.AppImage
          name: Moopon v1.1.1
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
